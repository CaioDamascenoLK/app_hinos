function gf(){
    let l=hymns;const f=st.f;
    if(f==='hinos')l=l.filter(h=>h.type==='hino');
    else if(f==='corinhos')l=l.filter(h=>h.type==='corinho');
    else if(f==='adultos')l=l.filter(h=>h.type==='hino'&&!h.isJovem);
    else if(f==='jovens')l=l.filter(h=>h.isJovem);
    else if(f.startsWith('occ-'))l=l.filter(h=>h.occ===f.replace('occ-',''));
    else if(f.startsWith('range-')){const[a,b]=f.replace('range-','').split('-').map(Number);l=l.filter(h=>h.type==='hino'&&h.num>=a&&h.num<=b)}
    else if(f.startsWith('letter-')){const lt=f.replace('letter-','');l=l.filter(h=>h.title.charAt(0).toUpperCase()===lt)}
    else if(f==='green')l=l.filter(h=>st.data[h.id]?.status==='green');
    else if(f==='yellow')l=l.filter(h=>st.data[h.id]?.status==='yellow');
    else if(f==='red')l=l.filter(h=>st.data[h.id]?.status==='red');
    else if(f==='none')l=l.filter(h=>!st.data[h.id]?.status);
    if(st.s.trim()){const q=st.s.trim().toLowerCase();l=l.filter(h=>h.num.toString().includes(q)||h.title.toLowerCase().includes(q))}
    return l;
}

function gs(){
    let g=0,y=0,r=0,j=0;hymns.forEach(h=>{const s=st.data[h.id]?.status;if(s==='green')g++;else if(s==='yellow')y++;else if(s==='red')r++;if(h.isJovem&&s)j++});
    const m=g+y+r;return{g,y,r,n:hymns.length-m,m,t:hymns.length,j};
}

            <div class="flex items-start justify-between mb-0.5">
                <span class="text-base font-bold text-tx leading-none">${ns}</span>
                <div class="flex items-center gap-1">${jv}${tag}${d?.note?.trim()?'<i class="fas fa-sticky-note text-[7px] text-acc/40"></i>':''}${d?.status?`<span class="w-1.5 h-1.5 rounded-full" style="background:${d.status==='green'?'#34D399':d.status==='yellow'?'#FBBF24':'#F87171'}"></span>`:''}</div>
            </div>
            <p class="text-[10.5px] text-tx-2 leading-snug lc2">${h.title}</p>
        </div>`}).join('')}
    rpg(fl.length,tp);
}

function rpg(t,tp){
    const c=document.getElementById('pg');if(tp<=1){c.innerHTML='';return}
    let h=`<button onclick="gP(${st.p-1})" class="w-8 h-8 flex items-center justify-center rounded-lg text-xs ${st.p===1?'text-tx-3/30 cursor-not-allowed':'text-tx-2 hover:bg-card hover:text-tx'}" ${st.p===1?'disabled':''}><i class="fas fa-chevron-left"></i></button>`;
    const r=gpr(st.p,tp);r.forEach(p=>{if(p==='...')h+='<span class="w-8 h-8 flex items-center justify-center text-tx-3 text-xs">...</span>';
    else h+=`<button onclick="gP(${p})" class="w-8 h-8 flex items-center justify-center rounded-lg text-xs font-semibold ${p===st.p?'bg-acc/15 text-acc':'text-tx-2 hover:bg-card hover:text-tx'}">${p}</button>`});
    h+=`<button onclick="gP(${st.p+1})" class="w-8 h-8 flex items-center justify-center rounded-lg text-xs ${st.p===tp?'text-tx-3/30 cursor-not-allowed':'text-tx-2 hover:bg-card hover:text-tx'}" ${st.p===tp?'disabled':''}><i class="fas fa-chevron-right"></i></button>`;
    c.innerHTML=h;
}
function gpr(c,t){if(t<=7)return Array.from({length:t},(_,i)=>i+1);if(c<=4)return[1,2,3,4,5,'...',t];if(c>=t-3)return[1,'...',t-4,t-3,t-2,t-1,t];return[1,'...',c-1,c,c+1,'...',t]}
function gP(p){const t=Math.max(1,Math.ceil(gf().length/PP));if(p<1||p>t)return;st.p=p;rg();window.scrollTo({top:0,behavior:'smooth'})}

function oP(id){
    st.sel=id;const h=hymns.find(x=>x.id===id);if(!h)return;
    const d=st.data[id]||{},isC=h.type==='corinho',ns=isC?`Corinho ${h.num}`:`Hino ${h.num}`;
    const sl={green:'Bom — consigo tocar bem',yellow:'Praticar — preciso treinar mais',red:'Difícil — não consigo tocar'};
    let occH='';if(h.occ)occH=`<div class="flex items-center gap-2 mt-2"><span class="ot" style="color:${OCC_COLOR[h.occ]};background:${OCC_COLOR[h.occ]}15">${OCC_LABEL[h.occ]}</span><span class="text-[11px] text-tx-3">Hino para ${OCC_LABEL[h.occ]==='S. Ceia'?'Santa Ceia':OCC_LABEL[h.occ].toLowerCase()}</span></div>`;
    document.getElementById('pC').innerHTML=`
    <div>
        <div class="flex items-center gap-2 mb-1">
            <span class="text-3xl font-display font-bold text-acc">${isC?'C'+h.num:String(h.num).padStart(3,'0')}</span>
            ${h.isJovem?'<span class="text-[9px] uppercase tracking-wider text-s-jovem font-bold bg-s-jovem/10 px-2 py-0.5 rounded-full">Jovem</span>':''}
            ${isC?'<span class="text-[9px] uppercase tracking-wider text-acc/70 font-bold bg-acc/10 px-2 py-0.5 rounded-full">Corinho</span>':''}
        </div>
        <h2 class="text-lg font-bold text-tx leading-snug mt-1.5">${h.title}</h2>
        <p class="text-tx-3 text-sm mt-0.5">${ns} do Hinário CCB</p>
        ${occH}
        ${d.lastUpdated?`<p class="text-tx-3 text-[10px] mt-2"><i class="far fa-clock mr-1"></i>Atualizado: ${new Date(d.lastUpdated).toLocaleString('pt-BR')}</p>`:''}
    </div>
    <div>
        <p class="text-[9px] font-bold text-tx-3 uppercase tracking-wider mb-2.5">Status de Prática</p>
        <div class="grid grid-cols-3 gap-2">
            <button class="sb ${d.status==='green'?'g1':''}" onclick="sS('${id}','green')"><i class="fas fa-check-circle text-lg"></i><span>Bom</span></button>
            <button class="sb ${d.status==='yellow'?'y1':''}" onclick="sS('${id}','yellow')"><i class="fas fa-exclamation-circle text-lg"></i><span>Praticar</span></button>
            <button class="sb ${d.status==='red'?'r1':''}" onclick="sS('${id}','red')"><i class="fas fa-times-circle text-lg"></i><span>Difícil</span></button>
        </div>
        ${d.status?`<p class="text-[11px] text-tx-3 mt-2 flex items-center gap-1.5"><span class="w-2 h-2 rounded-full" style="background:${d.status==='green'?'#34D399':d.status==='yellow'?'#FBBF24':'#F87171'}"></span>${sl[d.status]}</p>`:''}
        ${d.status?`<button onclick="sS('${id}',null)" class="text-[11px] text-tx-3 hover:text-tx-2 mt-1 transition-colors"><i class="fas fa-undo mr-1"></i>Remover marcação</button>`:''}
    </div>
    <div>
        <p class="text-[9px] font-bold text-tx-3 uppercase tracking-wider mb-2.5">Notas de Prática</p>
        <textarea id="nA" class="na" placeholder="Ex: Foco no contra-canto, praticar compasso 3/4...">${d.note||''}</textarea>
        <p class="text-[10px] text-tx-3 mt-1">Salvo automaticamente</p>
    </div>
    <div class="pt-3 border-t border-bdr">
        <p class="text-[9px] font-bold text-tx-3 uppercase tracking-wider mb-2.5">Navegação</p>
        <div class="flex gap-2">
            <button onclick="nH('${id}',-1)" class="flex-1 py-2.5 rounded-lg bg-card border border-bdr text-sm text-tx-2 hover:text-tx hover:border-bdr-h transition-colors"><i class="fas fa-arrow-left mr-1.5 text-xs"></i>Anterior</button>
            <button onclick="nH('${id}',1)" class="flex-1 py-2.5 rounded-lg bg-card border border-bdr text-sm text-tx-2 hover:text-tx hover:border-bdr-h transition-colors">Próximo<i class="fas fa-arrow-right ml-1.5 text-xs"></i></button>
        </div>
    </div>`;
    const nA=document.getElementById('nA');let tm=null;
    nA.addEventListener('input',()=>{clearTimeout(tm);tm=setTimeout(()=>{if(!st.data[id])st.data[id]={};st.data[id].note=nA.value;st.data[id].lastUpdated=new Date().toISOString();sv();rg()},500)});
    document.getElementById('dP').classList.add('pe');document.getElementById('pO').classList.remove('hidden');
}
function cP(){document.getElementById('dP').classList.remove('pe');document.getElementById('pO').classList.add('hidden');st.sel=null}
function sS(id,s){if(!st.data[id])st.data[id]={};if(s){st.data[id].status=s;st.data[id].lastUpdated=new Date().toISOString()}else{delete st.data[id].status;if(!st.data[id].note)delete st.data[id]}sv();rg();rs();oP(id)}
function nH(c,d){const l=gf(),i=l.findIndex(h=>h.id===c);if(i===-1)return;const n=i+d;if(n<0||n>=l.length)return;oP(l[n].id)}
function tS(){document.getElementById('sidebar').classList.toggle('-translate-x-full');document.getElementById('sO').classList.toggle('hidden')}

function rlg(){
    const ls=new Set();hymns.forEach(h=>ls.add(h.title.charAt(0).toUpperCase()));
    document.getElementById('lG').innerHTML=LETTERS.map(l=>`<button class="lb ${ls.has(l)?'':'off'}" data-l="${l}">${l}</button>`).join('');
}
document.getElementById('lG').addEventListener('click',e=>{const b=e.target.closest('.lb');if(!b||b.classList.contains('off'))return;const l=b.dataset.l;st.f=st.f===`letter-${l}`?'all':`letter-${l}`;st.p=1;uA();rg();if(window.innerWidth<768)tS()});

function eJ(){const b=new Blob([JSON.stringify({version:3,exportDate:new Date().toISOString(),app:'hinario-ccb-estudo',data:st.data},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`hinario-ccb-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href);sT('Progresso exportado!','fa-file-export','text-acc')}
function iJ(f){const r=new FileReader();r.onload=e=>{try{const p=JSON.parse(e.target.result);if(!p.data||typeof p.data!=='object'){sT('Arquivo inválido','fa-exclamation-triangle','text-s-red');return}let c=0;for(const[id,v]of Object.entries(p.data)){if(v.status||(v.note&&v.note.trim())){st.data[id]={status:v.status||null,note:v.note||'',lastUpdated:v.lastUpdated||new Date().toISOString()};c++}}sv();rg();rs();sT(`${c} hino(s) importado(s)!`,'fa-file-import','text-acc')}catch(er){sT('Erro ao ler arquivo','fa-exclamation-triangle','text-s-red')}};r.readAsText(f)}

let cCb=null;
function sCo(t,m,cb,bt,bc){document.getElementById('cT').textContent=t;document.getElementById('cX').textContent=m;const b=document.getElementById('cB');b.textContent=bt||'Confirmar';b.className=`px-4 py-2 rounded-lg text-sm font-semibold transition-colors ${bc||'bg-s-red/15 text-s-red hover:bg-s-red/25'}`;cCb=cb;const m2=document.getElementById('cM');m2.classList.remove('hidden');m2.classList.add('flex')}
function cC(){const m=document.getElementById('cM');m.classList.add('hidden');m.classList.remove('flex');cCb=null}
document.getElementById('cB').addEventListener('click',()=>{if(cCb)cCb();cC()});
document.getElementById('cM').addEventListener('click',e=>{if(e.target===document.getElementById('cM'))cC()});

let tTm=null;
function sT(m,i,c){const t=document.getElementById('to');document.getElementById('tM').textContent=m;document.getElementById('tI').className=`fas ${i||'fa-check-circle'} ${c||'text-s-green'}`;t.classList.add('ts');clearTimeout(tTm);tTm=setTimeout(()=>t.classList.remove('ts'),3000)}

function rnd(){const r=hymns.filter(h=>st.data[h.id]?.status==='red'),y=hymns.filter(h=>st.data[h.id]?.status==='yellow'),n=hymns.filter(h=>!st.data[h.id]?.status);let p=r.length?r:y.length?y:n.length?n:hymns;const pk=p[Math.floor(Math.random()*p.length)];oP(pk.id);let h=r.length?' (priorizando difíceis)':y.length?' (priorizando praticar)':'';sT(`${pk.type==='corinho'?'Corinho':'Hino'} ${pk.num} selecionado${h}`,'fa-dice','text-acc')}

function uA(){document.querySelectorAll('#nM .nb,#nC .nb,#nR .nb,#nS .nb,#nO .nb').forEach(b=>b.classList.toggle('on',b.dataset.f===st.f));document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',st.f===`letter-${b.dataset.l}`))}

['nM','nC','nR','nS','nO'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{const b=e.target.closest('.nb');if(!b)return;st.f=b.dataset.f;st.p=1;uA();rg();if(window.innerWidth<768)tS()})});

let sTm=null;
document.getElementById('sI').addEventListener('input',e=>{clearTimeout(sTm);sTm=setTimeout(()=>{st.s=e.target.value;st.p=1;rg()},200)});
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('sI').focus()}if(e.key==='Escape'){cP();cC()}});
document.getElementById('bE').addEventListener('click',eJ);
document.getElementById('bI').addEventListener('click',()=>document.getElementById('fI').click());
document.getElementById('fI').addEventListener('change',e=>{if(e.target.files.length>0){iJ(e.target.files[0]);e.target.value=''}});
document.getElementById('bC').addEventListener('click',()=>{sCo('Limpar todos os dados?','Vai apagar todas as marcações e notas.',()=>{st.data={};sv();rg();rs();cP();sT('Dados removidos','fa-trash-alt','text-s-red')},'Limpar tudo','bg-s-red/15 text-s-red hover:bg-s-red/25')});
document.getElementById('bR').addEventListener('click',rnd);

ld();rlg();rs();rg();
</script>
</body>
</html>
